<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyâz-ı Belde-i Edirne — Yapı Envanteri</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1208;--parchment:#f5efe0;--cream:#fdf8ee;
  --gold:#b08030;--gold-light:#d4a84b;--rust:#8b3a1a;
  --teal:#1a5f6a;--teal-light:#2a8a9a;--border:#c8b48a;
  --muted:#7a6848;--tag-bg:#e8dfc8;--highlight:#fff3cd;
  --row-hover:#fdf4e0;--wikidata:#1a6496;--ke:#2e7d32;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.site-header{background:var(--ink);color:var(--parchment);padding:20px 40px 14px;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,0.4);}
.header-top{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;}
.site-title{font-size:1.5rem;font-weight:300;letter-spacing:.04em;color:var(--gold-light);font-style:italic;}
.site-subtitle{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--border);letter-spacing:.12em;text-transform:uppercase;}
.header-meta{font-size:.82rem;color:var(--border);margin-top:3px;}
.entry-count{font-family:'Space Mono',monospace;color:var(--gold-light);font-size:.78rem;}

/* TABS */
.tab-bar{background:#252010;display:flex;gap:0;border-bottom:2px solid var(--gold);}
.tab-btn{padding:10px 28px;font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--border);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn:hover{color:var(--gold-light);}
.tab-btn.active{color:var(--gold-light);border-bottom-color:var(--gold-light);background:#1a1208;}

/* CONTROLS */
.controls{background:var(--parchment);border-bottom:2px solid var(--border);padding:12px 40px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:97px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.search-box{flex:1;min-width:180px;padding:7px 12px;border:1.5px solid var(--border);border-radius:4px;font-family:'Crimson Pro',serif;font-size:.95rem;background:white;color:var(--ink);outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--gold);}
.search-box::placeholder{color:var(--muted);font-style:italic;}
select.filter-select{padding:7px 10px;border:1.5px solid var(--border);border-radius:4px;font-family:'Crimson Pro',serif;font-size:.9rem;background:white;color:var(--ink);cursor:pointer;outline:none;}
select.filter-select:focus{border-color:var(--gold);}
.filter-badges{display:flex;gap:5px;flex-wrap:wrap;}
.badge-btn{padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--tag-bg);color:var(--ink);font-family:'Crimson Pro',serif;font-size:.82rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.badge-btn:hover{background:var(--border);}
.badge-btn.active{background:var(--ink);color:var(--gold-light);border-color:var(--ink);}
.results-info{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted);white-space:nowrap;}
.btn-export{padding:6px 12px;background:var(--teal);color:white;border:none;border-radius:4px;font-family:'Space Mono',monospace;font-size:.68rem;cursor:pointer;}
.btn-export:hover{background:var(--teal-light);}

/* TABLE */
.pane{display:none;}
.pane.active{display:block;}
.table-wrapper{padding:20px 40px 60px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.9rem;background:white;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.06);}
thead th{background:var(--ink);color:var(--gold-light);font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:10px 10px;text-align:left;border-right:1px solid #333;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:last-child{border-right:none;}
thead th:hover{background:#2a2010;}
tbody tr{border-bottom:1px solid #e8dfc8;transition:background .12s;}
tbody tr:hover{background:var(--row-hover);}
tbody tr.has-both{border-left:3px solid var(--gold);}
tbody tr.has-wikidata{border-left:3px solid var(--wikidata);}
tbody tr.has-ke{border-left:3px solid var(--ke);}
td{padding:8px 10px;vertical-align:top;border-right:1px solid #e8dfc8;}
td:last-child{border-right:none;}
.td-no{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);white-space:nowrap;}
.td-name{font-weight:600;color:var(--rust);min-width:160px;}
.type-badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:.72rem;font-family:'Space Mono',monospace;white-space:nowrap;}
.td-desc{max-width:300px;line-height:1.5;font-size:.85rem;color:#3a2a10;}
.desc-toggle{color:var(--gold);cursor:pointer;font-style:italic;}
.desc-full{display:none;}
.desc-full.open{display:inline;}
.td-edit{min-width:100px;}
.editable-cell{display:flex;align-items:center;gap:3px;}
.cell-input{width:100%;border:1px solid transparent;border-radius:3px;padding:3px 5px;font-family:'Space Mono',monospace;font-size:.72rem;background:transparent;color:var(--ink);transition:all .15s;}
.cell-input:focus{outline:none;border-color:var(--gold);background:var(--highlight);}
.cell-input.wikidata-input:not(:placeholder-shown){color:var(--wikidata);font-weight:700;}
.cell-input.ke-input:not(:placeholder-shown){color:var(--ke);font-weight:700;}
.td-coords{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--teal);white-space:nowrap;min-width:120px;}
.coords-map-link{color:var(--teal-light);text-decoration:none;display:block;}
.coords-map-link:hover{text-decoration:underline;}
.fetch-status{font-size:.68rem;color:var(--muted);font-style:italic;display:block;margin-top:2px;}
.fetch-ok{color:var(--ke);}
.fetch-err{color:var(--rust);}

/* SURVIVAL COLUMN */
.td-survival{white-space:nowrap;min-width:110px;}
.surv-select{width:100%;padding:2px 4px;border:1px solid transparent;border-radius:3px;font-family:'Space Mono',monospace;font-size:.68rem;background:transparent;cursor:pointer;}
.surv-select:focus{outline:none;border-color:var(--gold);background:var(--highlight);}
.surv-select.surv-yes{color:#2e7d32;}
.surv-select.surv-no{color:#c62828;}
.surv-select.surv-partial{color:#e65100;}
.surv-select.surv-unknown{color:var(--muted);}

/* Category badge colors */
.cat-cami{background:#e8f0fe;color:#1a4080;}
.cat-mescit{background:#dce8ff;color:#2a5098;}
.cat-tekke{background:#fce8f3;color:#7a1060;}
.cat-medrese{background:#fff3e0;color:#7a3010;}
.cat-turbe{background:#f3e5f5;color:#4a1070;}
.cat-imaret{background:#e8f5e9;color:#1b5e20;}
.cat-mektep{background:#fff9c4;color:#5a4000;}
.cat-carsi{background:#fff3e0;color:#6a3000;}
.cat-han{background:#efebe9;color:#3e2723;}
.cat-hamam{background:#e0f7fa;color:#006064;}
.cat-sebil{background:#b2dfdb;color:#00695c;}
.cat-cesme{background:#e0f2f1;color:#004d40;}
.cat-havuz{background:#b3e5fc;color:#01579b;}
.cat-buzhane{background:#e8eaf6;color:#283593;}
.cat-kilise{background:#fce4ec;color:#880e4f;}
.cat-havra{background:#f8bbd0;color:#880e4f;}
.cat-kopru{background:#ede7f6;color:#1a237e;}
.cat-saray{background:#fffde7;color:#5a4000;}
.cat-nehir{background:#e3f2fd;color:#0d47a1;}
.cat-okmeydani{background:#f1f8e9;color:#1b5e20;}
.cat-diger{background:#f5f5f5;color:#424242;}

.no-results{text-align:center;padding:60px 20px;font-style:italic;color:var(--muted);font-size:1.1rem;}

/* MAP */
#map-pane{height:calc(100vh - 175px);position:relative;}
#map{width:100%;height:100%;}
.map-legend{position:absolute;bottom:30px;right:12px;background:rgba(26,18,8,0.92);color:var(--parchment);padding:12px 16px;border-radius:6px;font-family:'Space Mono',monospace;font-size:.65rem;z-index:1000;max-height:60vh;overflow-y:auto;border:1px solid var(--gold);}
.map-legend h4{color:var(--gold-light);margin-bottom:8px;font-size:.7rem;letter-spacing:.08em;}
.legend-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;cursor:pointer;opacity:.9;}
.legend-row:hover{opacity:1;}
.legend-row.hidden-layer .legend-dot{opacity:.3;}
.legend-row.hidden-layer span{opacity:.5;}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.3);}
.map-info{position:absolute;top:12px;left:12px;background:rgba(26,18,8,0.88);color:var(--parchment);padding:8px 12px;border-radius:5px;font-family:'Space Mono',monospace;font-size:.65rem;z-index:1000;border:1px solid var(--gold);}
.marker-label{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;}

@media(max-width:900px){
  .site-header,.controls,.table-wrapper{padding-left:14px;padding-right:14px;}
  .controls{top:76px;}
  table{font-size:.8rem;}
  td,th{padding:6px 7px;}
  .td-desc{max-width:180px;}
}
</style>
</head>

</div>
</div>

let state = {
  data: RAW_DATA.map(r => ({
    id:r[0], name:r[1], type:r[2], desc:r[3],
    wikidata:'', ke:'', survival:'', lat:'', lng:'',
    wikiFetching:false, wikiFetchMsg:''
  })),
  sortCol:null, sortDir:1,
  searchText:'', catFilter:'', pairFilter:'all',
  currentTab:'table'
};

// ========================
// PERSISTENCE
// ========================
function loadSaved(){
  try{
    const s = localStorage.getItem('edirne_v3');
    if(s){ const p=JSON.parse(s); p.forEach(it=>{ const r=state.data.find(x=>x.id===it.id); if(r){r.wikidata=it.wikidata||'';r.ke=it.ke||'';r.survival=it.survival||'';r.lat=it.lat||'';r.lng=it.lng||'';} }); }
  }catch(e){}
}
function saveData(){
  try{ localStorage.setItem('edirne_v3',JSON.stringify(state.data.map(r=>({id:r.id,wikidata:r.wikidata,ke:r.ke,survival:r.survival,lat:r.lat,lng:r.lng})))); }catch(e){}
}

// ========================
// WIKIDATA
// ========================
async function fetchWikidataCoords(qid, rowId){
  if(!qid||!/^Q\d+$/i.test(qid.trim())) return;
  const row = state.data.find(r=>r.id===rowId);
  if(!row) return;
  row.wikiFetching=true; row.wikiFetchMsg='Sorgulanıyor…';
  renderTable();
  try{
    const cq = qid.trim().toUpperCase();
    const resp = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${cq}.json`);
    const data = await resp.json();
    const ent = data.entities[cq];
    if(ent&&ent.claims&&ent.claims['P625']){
      const cv = ent.claims['P625'][0].mainsnak.datavalue.value;
      row.lat = cv.latitude.toFixed(6);
      row.lng = cv.longitude.toFixed(6);
      row.wikiFetchMsg = '✓ Koordinat alındı';
    } else {
      row.wikiFetchMsg = '— Koordinat yok';
    }
  }catch(e){ row.wikiFetchMsg='✗ '+e.message; }
  row.wikiFetching=false;
  saveData();
  renderTable();
  updateMapMarkers();
}

// ========================
// FILTER
// ========================
function getFiltered(){
  let rows=[...state.data];
  const q=state.searchText.toLowerCase().trim();
  if(q) rows=rows.filter(r=>r.name.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||r.id.toLowerCase().includes(q)||r.type.toLowerCase().includes(q));
  if(state.catFilter) rows=rows.filter(r=>r.type===state.catFilter);
  if(state.pairFilter!=='all'){
    if(state.pairFilter==='wikidata') rows=rows.filter(r=>r.wikidata);
    else if(state.pairFilter==='no-wikidata') rows=rows.filter(r=>!r.wikidata);
    else if(state.pairFilter==='ke') rows=rows.filter(r=>r.ke);
    else if(state.pairFilter==='no-ke') rows=rows.filter(r=>!r.ke);
    else if(state.pairFilter==='both') rows=rows.filter(r=>r.wikidata&&r.ke);
    else if(state.pairFilter==='none') rows=rows.filter(r=>!r.wikidata&&!r.ke);
    else if(state.pairFilter==='ayakta') rows=rows.filter(r=>r.survival==='yes');
    else if(state.pairFilter==='yikilmis') rows=rows.filter(r=>r.survival==='no');
  }
  if(state.sortCol) rows.sort((a,b)=>(a[state.sortCol]||'').localeCompare(b[state.sortCol]||'','tr')*state.sortDir);
  return rows;
}

// ========================
// RENDER TABLE
// ========================
function renderTable(){
  const rows=getFiltered();
  const tbody=document.getElementById('tableBody');
  const noRes=document.getElementById('noResults');
  document.getElementById('resultsInfo').textContent=rows.length+' kayıt';
  if(!rows.length){tbody.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';
  tbody.innerHTML=rows.map(row=>{
    const css=TYPE_CSS[row.type]||'cat-diger';
    const trCls=row.wikidata&&row.ke?'has-both':row.wikidata?'has-wikidata':row.ke?'has-ke':'';
    const dShort=row.desc.length>110?row.desc.slice(0,110)+'… ':row.desc;
    const hasFull=row.desc.length>110;
    const coordCell=row.lat&&row.lng
      ?`<a class="coords-map-link" href="https://www.openstreetmap.org/?mlat=${row.lat}&mlon=${row.lng}#map=17/${row.lat}/${row.lng}" target="_blank">📍 ${row.lat}, ${row.lng}</a>`
      :'<span style="color:var(--muted);font-style:italic">—</span>';
    const fetchMsg=row.wikiFetching?`<span class="fetch-status">⏳ ${row.wikiFetchMsg}</span>`
      :row.wikiFetchMsg?`<span class="fetch-status ${row.wikiFetchMsg.startsWith('✓')?'fetch-ok':'fetch-err'}">${row.wikiFetchMsg}</span>`:'';
    const survVal=row.survival||'';
    const survCls=survVal==='yes'?'surv-yes':survVal==='no'?'surv-no':survVal==='partial'?'surv-partial':'surv-unknown';
    const survLabel=survVal==='yes'?'✓ Ayakta':survVal==='no'?'✗ Yıkılmış':survVal==='partial'?'~ Kısmen':'— Bilinmiyor';
    return `<tr class="${trCls}" data-id="${row.id}">
<td class="td-no">${row.id}</td>
<td class="td-name">${row.name}</td>
<td class="td-type"><span class="type-badge ${css}">${row.type}</span></td>
<td class="td-desc"><span>${dShort}</span>${hasFull?`<span class="desc-full" id="df-${row.id}">${row.desc.slice(110)}</span><span class="desc-toggle" onclick="tgl('${row.id}')">daha</span>`:''}</td>
<td class="td-edit">
  <div class="editable-cell"><input class="cell-input wikidata-input" type="text" placeholder="Q…" value="${row.wikidata}" data-id="${row.id}" data-field="wikidata" onchange="cellChange(this)" onkeydown="ckd(event,this)"></div>
  ${fetchMsg}
</td>
<td class="td-edit"><div class="editable-cell"><input class="cell-input ke-input" type="text" placeholder="KE…" value="${row.ke}" data-id="${row.id}" data-field="ke" onchange="cellChange(this)" onkeydown="ckd(event,this)"></div></td>
<td class="td-survival">
  <select class="surv-select ${survCls}" data-id="${row.id}" onchange="survChange(this)">
    <option value="" ${!survVal?'selected':''}>— Bilinmiyor</option>
    <option value="yes" ${survVal==='yes'?'selected':''}>✓ Ayakta</option>
    <option value="no" ${survVal==='no'?'selected':''}>✗ Yıkılmış</option>
    <option value="partial" ${survVal==='partial'?'selected':''}>~ Kısmen</option>
  </select>
</td>
<td class="td-coords">${coordCell}</td>
</tr>`;
  }).join('');
}

function tgl(id){
  const el=document.getElementById('df-'+id);
  const t=el.nextElementSibling;
  if(el.classList.contains('open')){el.classList.remove('open');t.textContent='daha';}
  else{el.classList.add('open');t.textContent='gizle';}
}
function cellChange(inp){
  const id=inp.dataset.id,field=inp.dataset.field,val=inp.value.trim();
  const row=state.data.find(r=>r.id===id);
  if(!row)return;
  row[field]=val;
  if(field==='wikidata'&&val){row.wikiFetchMsg='';fetchWikidataCoords(val,id);}
  saveData();
  const tr=inp.closest('tr');
  if(tr) tr.className=row.wikidata&&row.ke?'has-both':row.wikidata?'has-wikidata':row.ke?'has-ke':'';
}
function survChange(sel){
  const id=sel.dataset.id;
  const row=state.data.find(r=>r.id===id);
  if(!row)return;
  row.survival=sel.value;
  sel.className='surv-select'+(sel.value==='yes'?' surv-yes':sel.value==='no'?' surv-no':sel.value==='partial'?' surv-partial':' surv-unknown');
  saveData();
}
function ckd(e,inp){if(e.key==='Enter'){inp.blur();cellChange(inp);}}
function sortBy(col){if(state.sortCol===col)state.sortDir*=-1;else{state.sortCol=col;state.sortDir=1;}renderTable();}

// ========================
// MAP
// ========================
let map=null, markers={}, hiddenTypes=new Set();

function initMap(){
  if(map) return;
  map = L.map('map').setView([41.678, 26.556], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',maxZoom:19
  }).addTo(map);
  buildLegend();
  updateMapMarkers();
}

function getTypeColor(type){ return TYPE_COLORS[type]||'#777'; }

function makeIcon(type,id){
  const c=getTypeColor(type);
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 10 14 22 14 22s14-12 14-22C28 6.27 21.73 0 14 0z" fill="${c}" stroke="white" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="5" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    className:'',
    html:svg,
    iconSize:[28,36],iconAnchor:[14,36],popupAnchor:[0,-36]
  });
}

function updateMapMarkers(){
  if(!map) return;
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  const withCoords = state.data.filter(r=>r.lat&&r.lng);
  withCoords.forEach(row=>{
    if(hiddenTypes.has(row.type)) return;
    const m = L.marker([parseFloat(row.lat),parseFloat(row.lng)],{icon:makeIcon(row.type,row.id)})
      .bindPopup(`<b style="color:${getTypeColor(row.type)}">${row.name}</b><br>
        <span style="font-family:monospace;font-size:11px;color:#555">${row.id}</span><br>
        <span style="font-size:12px">${row.type}</span><br>
        ${row.wikidata?`<a href="https://www.wikidata.org/wiki/${row.wikidata}" target="_blank">${row.wikidata}</a>`:''}
        <br><small style="color:#777">${row.lat}, ${row.lng}</small>`)
      .addTo(map);
    markers[row.id]=m;
  });
  document.getElementById('mapInfo').textContent=
    withCoords.length ? `${withCoords.length} yapı konumlandırıldı` : 'Wikidata QID girilen yapılar haritada gösterilir.';
}

function buildLegend(){
  const leg=document.getElementById('mapLegend');
  leg.innerHTML='<h4>YAPI TÜRLERİ</h4>';
  Object.entries(TYPE_COLORS).forEach(([type,color])=>{
    const row=document.createElement('div');
    row.className='legend-row';
    row.dataset.type=type;
    row.innerHTML=`<div class="legend-dot" style="background:${color}"></div><span>${type}</span>`;
    row.onclick=()=>{
      if(hiddenTypes.has(type)){hiddenTypes.delete(type);row.classList.remove('hidden-layer');}
      else{hiddenTypes.add(type);row.classList.add('hidden-layer');}
      updateMapMarkers();
    };
    leg.appendChild(row);
  });
}

// ========================
// TABS
// ========================
function showTab(tab){
  state.currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
  document.getElementById(tab+'-pane').classList.add('active');
  if(tab==='map'){setTimeout(()=>{initMap();map.invalidateSize();},50);}
}

// ========================
// CSV EXPORT
// ========================
function exportCSV(){
  const rows=getFiltered();
  const hdrs=['Kod','Yapı Adı','Tür','Açıklama','Wikidata QID','KE ID','Günümüzde','Enlem','Boylam'];
  const lines=[hdrs.join(',')];
  rows.forEach(r=>{ lines.push([r.id,r.name,r.type,r.desc.replace(/,/g,'،'),r.wikidata,r.ke,r.survival,r.lat,r.lng].map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')); });
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='edirne_yapilari.csv';a.click();
}

// ========================
// EVENTS
// ========================
document.getElementById('searchInput').addEventListener('input',e=>{state.searchText=e.target.value;renderTable();});
document.getElementById('catFilter').addEventListener('change',e=>{state.catFilter=e.target.value;renderTable();});
document.querySelectorAll('.badge-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.badge-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');state.pairFilter=b.dataset.pair;renderTable();
}));

// ========================
// INIT
// ========================
loadSaved();
renderTable();
